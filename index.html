<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Anchor Art — Two-Station Gallery</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    #banner {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(6,10,11,0.85); color: #35c8c2;
      font-family: monospace; font-size: 14px; letter-spacing: 0.1em;
      padding: 10px 18px; border-radius: 20px; z-index: 10;
      opacity: 0; transition: opacity 0.6s;
      pointer-events: none;
    }
  </style>
</head>
<body style="margin:0">

  <!-- This banner appears when BOTH paintings have been discovered -->
  <div id="banner">BOTH PORTRAITS FOUND ✦</div>

  <!-- maxTrack: 2 lets both paintings be tracked at the same time,
       since they hang side by side and can share the camera frame. -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ================= STATION 1 =================
         targetIndex 0 = the FIRST image you upload to the compiler.
         Keep your original portrait first so this stays station 1. -->
    <a-entity id="station1" mindar-image-target="targetIndex: 0">

      <!-- Alignment ring, flat on the painting -->
      <a-torus position="0 0 0.01" radius="0.45" radius-tubular="0.01"
               color="#dbe7e9" opacity="0.6"></a-torus>

      <!-- Teal cube close to the surface (reads as locked to the art) -->
      <a-box position="0 0.55 0.05" scale="0.18 0.18 0.18" color="#35c8c2"
             animation="property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear">
      </a-box>
    </a-entity>

    <!-- ================= STATION 2 =================
         targetIndex 1 = the SECOND image you upload to the compiler
         (the adjacent portrait). Different color + shape so you can
         instantly confirm which target is which. -->
    <a-entity id="station2" mindar-image-target="targetIndex: 1">

      <a-torus position="0 0 0.01" radius="0.45" radius-tubular="0.01"
               color="#dbe7e9" opacity="0.6"></a-torus>

      <!-- Coral octahedron, gently bobbing -->
      <a-octahedron position="0 0.55 0.05" radius="0.14" color="#e8734a"
        animation__spin="property: rotation; to: 360 360 0; dur: 8000; loop: true; easing: linear"
        animation__bob="property: position; from: 0 0.5 0.05; to: 0 0.62 0.05; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
      </a-octahedron>
    </a-entity>
  </a-scene>

  <script>
    // ---- Tiny "experience" logic: remember which stations the visitor
    // ---- has found, and celebrate when they've seen both.
    const found = { s1: false, s2: false };
    const banner = document.getElementById('banner');

    function check() {
      if (found.s1 && found.s2) {
        banner.style.opacity = 1;
        setTimeout(() => banner.style.opacity = 0, 4000);
      }
    }

    document.querySelector('#station1').addEventListener('targetFound', () => {
      found.s1 = true; check();
    });
    document.querySelector('#station2').addEventListener('targetFound', () => {
      found.s2 = true; check();
    });
  </script>
</body>
</html>
