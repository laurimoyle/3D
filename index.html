<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AR Anchor Art — Sculpture Ghost</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    #hint {
      position: fixed; bottom: 20px; left: 0; right: 0;
      text-align: center; color: white; font-family: sans-serif;
      font-size: 15px; text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hint">Point your camera at the painting</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="sculpture" src="./sculpture.png" crossorigin="anonymous" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Everything inside this entity appears anchored to your painting -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!--
        The sculpture cutout, floating above the painting. Completely still.
        The marker (your painting) is 1 unit wide in MindAR's coordinate system.
        Image is 713x1024 px, so width 0.75 / height 1.08 keeps its true proportions.
        y = 1.15 places it just above the top edge of the painting.
        z = 0.1 lifts it slightly off the wall toward the viewer.
      -->
      <a-image
        src="#sculpture"
        width="0.75"
        height="1.08"
        position="0 1.15 0.1"
        transparent="true"
        alpha-test="0.05">
      </a-image>

    </a-entity>
  </a-scene>

  <script>
    // Hide the hint once the painting is found; bring it back if tracking is lost
    document.addEventListener('DOMContentLoaded', () => {
      const target = document.querySelector('[mindar-image-target]');
      const hint = document.getElementById('hint');
      target.addEventListener('targetFound', () => { hint.style.display = 'none'; });
      target.addEventListener('targetLost',  () => { hint.style.display = 'block'; });
    });
  </script>
</body>
</html>
